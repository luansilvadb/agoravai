<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Sistema PDV - Ponto de Venda Responsivo">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- Security Headers (CSP) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">
    <title>PDV - Sistema de Vendas</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/zod@3.22.4/lib/index.umd.js"></script>
    <script src="https://unpkg.com/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar Navigation (Desktop) -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i data-lucide="store" class="logo-icon"></i>
                    <span class="logo-text">PDV System</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle-btn" aria-label="Colapsar menu">
                    <i data-lucide="panel-left-close"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <!-- Vendas - Item raiz -->
                <button class="nav-item" data-view="pos" data-nav-id="pos">
                    <i data-lucide="shopping-cart"></i>
                    <span>Vendas</span>
                </button>

                <!-- Produtos - Menu pai com submenu -->
                <div class="nav-parent" data-nav-id="products">
                    <button class="nav-item nav-parent-toggle" aria-expanded="false" aria-haspopup="true">
                        <i data-lucide="package"></i>
                        <span>Produtos</span>
                        <i data-lucide="chevron-down" class="nav-expand-icon"></i>
                    </button>
                    <div class="nav-children">
                        <button class="nav-child" data-view="products" data-child-view="list">
                            <i data-lucide="list"></i>
                            <span>Listar</span>
                        </button>
                        <button class="nav-child" data-view="product-form" data-child-view="create">
                            <i data-lucide="plus-circle"></i>
                            <span>Cadastrar</span>
                        </button>
                        <button class="nav-child" data-view="categories" data-child-view="categories">
                            <i data-lucide="tags"></i>
                            <span>Categorias</span>
                        </button>
                    </div>
                </div>

                <!-- Dashboard - Item raiz -->
                <button class="nav-item" data-view="dashboard" data-nav-id="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </button>

                <!-- Histórico - Menu pai com submenu -->
                <div class="nav-parent" data-nav-id="history">
                    <button class="nav-item nav-parent-toggle" aria-expanded="false" aria-haspopup="true">
                        <i data-lucide="history"></i>
                        <span>Histórico</span>
                        <i data-lucide="chevron-down" class="nav-expand-icon"></i>
                    </button>
                    <div class="nav-children">
                        <button class="nav-child" data-view="history" data-child-view="sales">
                            <i data-lucide="receipt"></i>
                            <span>Vendas</span>
                        </button>
                        <button class="nav-child" data-view="cancellations" data-child-view="cancellations">
                            <i data-lucide="x-circle"></i>
                            <span>Cancelamentos</span>
                        </button>
                    </div>
                </div>
            </nav>

            <!-- Footer fixo com contexto do operador -->
            <div class="sidebar-footer">
                <div class="user-context">
                    <div class="user-avatar">
                        <i data-lucide="user"></i>
                    </div>
                    <div class="user-info">
                        <span class="user-name">Operador</span>
                        <span class="register-info">
                            <span class="register-status online"></span>
                            Caixa #1 - Aberto
                        </span>
                    </div>
                </div>
                <div class="footer-actions">
                    <button class="footer-action-btn" data-tooltip="Configurações" aria-label="Configurações">
                        <i data-lucide="settings"></i>
                    </button>
                    <button class="footer-action-btn" data-tooltip="Ajuda" aria-label="Ajuda">
                        <i data-lucide="help-circle"></i>
                    </button>
                    <button class="footer-action-btn" data-tooltip="Sair" aria-label="Sair">
                        <i data-lucide="log-out"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Mobile Header -->
        <header class="mobile-header">
            <button id="menu-toggle" class="menu-toggle" aria-label="Menu">
                <i data-lucide="menu"></i>
            </button>
            <span class="header-title">PDV System</span>
            <div class="header-actions">
                <button id="cart-toggle" class="cart-toggle" aria-label="Carrinho">
                    <i data-lucide="shopping-cart"></i>
                    <span class="cart-badge" id="cart-badge">0</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="main-content">
            <!-- Views will be rendered here -->
        </main>

        <!-- Mobile Cart Drawer -->
        <div id="cart-drawer" class="cart-drawer">
            <div class="cart-drawer-header">
                <h3>Carrinho</h3>
                <button id="close-cart" class="close-btn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="cart-drawer-content" class="cart-drawer-content">
                <!-- Cart content rendered here -->
            </div>
        </div>

        <!-- Mobile Navigation Menu -->
        <div id="mobile-menu" class="mobile-menu">
            <div class="mobile-menu-header">
                <span>Menu</span>
                <button id="close-menu" class="close-btn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <nav class="mobile-nav">
                <button class="mobile-nav-item" data-view="pos">
                    <i data-lucide="shopping-cart"></i>
                    <span>Vendas</span>
                </button>
                <button class="mobile-nav-item" data-view="products">
                    <i data-lucide="package"></i>
                    <span>Produtos</span>
                </button>
                <button class="mobile-nav-item" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </button>
                <button class="mobile-nav-item" data-view="history">
                    <i data-lucide="history"></i>
                    <span>Histórico</span>
                </button>
            </nav>
        </div>

        <!-- Overlay -->
        <div id="overlay" class="overlay"></div>

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- Security Scripts -->
    <script src="js/security/config.js"></script>
    <script src="js/security/validation.js"></script>
    <script src="js/security/xss.js"></script>
    <script src="js/security/csrf.js"></script>
    <script src="js/security/rateLimit.js"></script>
    <script src="js/security/errors.js"></script>
    <script src="js/security/upload.js"></script>

    <!-- Scripts -->
    <script src="js/models/Product.js"></script>
    <script src="js/models/CartItem.js"></script>
    <script src="js/models/Cart.js"></script>
    <script src="js/models/Sale.js"></script>
    <script src="js/services/StorageService.js"></script>
    <script src="js/services/CartManager.js"></script>
    <script src="js/views/ProductListView.js"></script>
    <script src="js/views/ProductFormView.js"></script>
    <script src="js/views/CartView.js"></script>
    <script src="js/views/CheckoutView.js"></script>
    <script src="js/views/DashboardView.js"></script>
    <script src="js/views/SaleHistoryView.js"></script>
    <script src="js/views/PosView.js"></script>
    <!-- PosPremiumView loaded dynamically as ES module by router -->
    <script src="js/app.js"></script>
    
    <!-- POS Premium CSS - loaded dynamically based on feature flag -->
    <script>
        // Feature flag check for POS Premium CSS
        (function() {
            const usePremiumPOS = localStorage.getItem('pos-feature-usePremiumPOS') === 'true';
            if (usePremiumPOS || window.location.hash === '#pos-premium') {
                // Load POS Premium styles
                const styles = [
                    'css/pos-premium/tokens.css',
                    'css/pos-premium/theme-dark.css',
                    'css/pos-premium/theme-high-contrast.css',
                    'css/pos-premium/layout-desktop.css',
                    'css/pos-premium/layout-tablet.css',
                    'css/pos-premium/layout-mobile.css',
                    'css/pos-premium/accessibility.css',
                    'css/pos-premium/print.css'
                ];
                
                styles.forEach(href => {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = href;
                    document.head.appendChild(link);
                });
            }
        })();
    </script>
</body>
</html>
